<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Time Table</title>
<style>
    body {
        font-family: Arial, sans-serif;
    }
    table {
        border-collapse: collapse;
        margin: 20px auto;
        text-align: center;
    }
    th, td {
        border: 2px solid black;
        padding: 10px 15px;
    }
    .title {
        font-weight: bold;
        font-size: 20px;
        background-color: #f2f2f2;
    }
</style>
</head>
<body>

<table>
    <tr>
        <th colspan="6" class="title">Time Table</th>
    </tr>

    <tr>
        <td rowspan="6">Hours</td>
        <th>Mon</th>
        <th>Tue</th>
        <th>Wed</th>
        <th>Thu</th>
        <th>Fri</th>
    </tr>

    <tr>
        <td>Math</td>
        <td>Science</td>
        <td>Math</td>
        <td>Science</td>
        <td>Arts</td>
    </tr>

    <tr>
        <td>Math</td>
        <td>Science</td>
        <td>Math</td>
        <td>Science</td>
        <td>Arts</td>
    </tr>

    <tr>
        <td colspan="5">Lunch</td>
    </tr>

    <tr>
        <td>Math</td>
        <td>Science</td>
        <td>Math</td>
        <td colspan="2" rowspan="2">Project</td>
    </tr>

    <tr>
        <td>Math</td>
        <td>Science</td>
        <td>Math</td>
    </tr>

</table>

</body>
</html>
