<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Table</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            padding: 30px;
        }

        .table-container {
            width: 80%;
            margin: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 10px;
        }

        thead th {
            background: linear-gradient(to bottom, #9bd12f, #6fb51c);
            color: white;
            padding: 15px;
            font-size: 20px;
            text-align: center;
            border-radius: 10px;
        }

        tbody td {
            background: #cfe3b4;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            color: #555;
            border-radius: 10px;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
        }

        tbody tr:hover td {
            background: #b9d89d;
            transition: 0.3s;
        }
    </style>
</head>
<body>

<div class="table-container">
    <table border="2">
        <thead>
            <tr>
                <th>Product ID</th>
                <th>Product Name</th>
                <th>Product Quality</th>
                <th>Product Quantity</th>
            </tr>
        </thead>

        <tbody>

            </tr>

            </tr>

            </tr>

            </tr>
            <tr>

            </tr>
            <tr>
                <td>3</td>
                <td>Sugar</td>
                <td>Good</td>
                <td>200 Bags</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
