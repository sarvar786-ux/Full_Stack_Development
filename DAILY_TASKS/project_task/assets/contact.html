<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taco Shop Contact</title>
</head>
<body>
    <h1>Contact Us</h1>
    <nav>
        <ul>
            <li><a href="./index.html">Home</a></li>

    <figure>
        <img src="./image3.png" alt="Contact Us">
        <figcaption>Tacos And a Drink</figcaption>
    </figure>
    <h2>Our Contact Form</h2>
    <form action="" method="get" target="">
        <fieldset>
            <legend>Send Us Message:</legend>
            <br>
                    <td><label for="username">Name :</label></td>
                    <td><input type="text" name="username" id="username" placeholder="Enter Name"></td>
                </tr>
                <br><br>
                <tr>
                    <td><label for="E-mail">Email :</label></td>
                    <td><input type="email" name="E-mail" id="E-mail" placeholder="Enter Email"></td>
                </tr>
                <br><br>
                <tr>
                    <td><label for="Message"> Your Message :</label></td><br><br>
                    <td><textarea name="Message" id="Message"  rows="10" cols="25"></textarea></td>
                </tr>
        </fieldset>
        <br>
        <button type="submit">Send </button>
        <button type="reset">Reset</button>
    </form>
    <h2>Our Location</h2>
    
    <address>
          555 Taco Temptation Lane, Suite T
