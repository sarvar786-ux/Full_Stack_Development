<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Form Input Controls Example</title>

<style>
    body {
        font-family: "Times New Roman", serif;
        margin: 40px;
    }

    h1 {
        text-align: center;
        font-size: 40px;
    }

    form {
        max-width: 900px;
        margin: auto;
    }

    .row {
        margin-bottom: 15px;
    }

    label {
        margin-right: 10px;
    }

    input, select, textarea {
        padding: 5px;
        margin-right: 15px;
    }

    textarea {
        width: 400px;
        height: 100px;
        display: block;
        margin-top: 10px;
    }

    .inline {
        display: inline-block;
        margin-right: 20px;
    }
</style>

</head>
<body>

<h1>Form Input Controls Example</h1>

<form>

    <!-- Row 1 -->
    <div class="row">
        <label>Name:</label>
        <input type="text" placeholder="Enter your name">

        <label>Password:</label>
        <input type="password" placeholder="Enter your password">

        <label>Email:</label>
        <input type="email" placeholder="Enter your email">
    </div>

    <!-- Row 2 -->
    <div class="row">
        <label>Age:</label>
        <input type="number" value="18" style="width:60px;">

        <label>Rating:</label>
        <input type="range" min="0" max="10">

        <label>Date of Birth:</label>
        <input type="date">
    </div>

    <!-- Row 3 -->
    <div class="row">
        <label>Time:</label>
        <input type="time">

        <label>Image:</label>
        <input type="file">
    </div>

    <!-- Row 4 -->
    <div class="row">
        <label>Week:</label>
        <input type="week">
    </div>

    <!-- Row 5 -->
    <div class="row">
        <label>Month:</label>
        <input type="month">
    </div>

    <!-- Row 6 -->
    <div class="row">
        <label>Datetime-Local:</label>
        <input type="datetime-local">
    </div>

    <!-- Row 7 -->
    <div class="row">
        <label>URL:</label>
        <input type="url" style="width:250px;">
    </div>

    <!-- Row 8 -->
    <div class="row">
        <label>Search:</label>
        <input type="search" style="width:250px;">
    </div>

    <!-- Gender -->
    <div class="row">
        <label>Gender:</label><br>
        <input type="radio" name="gender" checked> Male
        <input type="radio" name="gender"> Female
    </div>

    <!-- Interests -->
    <div class="row">
        <label>Interests:</label><br>
        <input type="checkbox"> Reading
        <input type="checkbox" checked> Sports
    </div>

    <!-- Country -->
    <div class="row">
        <label>Country:</label>
        <select>
            <option>United States</option>
            <option>India</option>
            <option>UK</option>
        </select>
    </div>

    <!-- Message -->
    <div class="row">
        <label>Message:</label>
        <textarea placeholder="Enter your message"></textarea>
    </div>

    <!-- Submit -->
    <div class="row">
        <input type="submit" value="Submit">
    </div>

</form>

</body>
</html>
