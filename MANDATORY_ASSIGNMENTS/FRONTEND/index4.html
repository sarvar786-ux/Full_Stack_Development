<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Page</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f1f3f6;
}

/* Main container */
.container {
    width: 800px;
    height: 500px;
    margin: 50px auto;
    display: flex;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* Left section */
.left {
    width: 40%;
    background: #2874f0;
    color: white;
    padding: 40px 30px;
    position: relative;
}

.left h1 {
    margin-bottom: 20px;
}

.left p {
    line-height: 1.5;
    font-size: 15px;
}

/* Illustration (optional placeholder) */
.left img {
    position: absolute;
    bottom: 20px;
    width: 80%;
}

/* Right section */
.right {
    width: 60%;
    background: white;
    padding: 40px;
    position: relative;
}

/* Input field */
.input-box {
    margin-top: 20px;
}

.input-box input {
    width: 100%;
    border: none;
    border-bottom: 1px solid #ccc;
    padding: 10px 0;
    font-size: 16px;
    outline: none;
}

/* Terms text */
.terms {
    font-size: 12px;
    color: #878787;
    margin-top: 20px;
}

.terms a {
    color: #2874f0;
    text-decoration: none;
}

/* Button */
.btn {
    margin-top: 20px;
}

.btn button {
    width: 100%;
    background: #fb641b;
    border: none;
    color: white;
    padding: 12px;
    font-size: 16px;
    cursor: pointer;
}

/* Bottom link */
.bottom-text {
    position: absolute;
    bottom: 20px;
    left: 40px;
    font-size: 14px;
}

.bottom-text a {
    color: #2874f0;
    text-decoration: none;
}
</style>

</head>

<body>

<div class="container">
    
    <!-- Left Side -->
    <div class="left">
        <h1>Login</h1>
        <p>Get access to your Orders, Wishlist and Recommendations</p>
        
        <!-- Optional image -->
        <img src="./logo_flip.png" alt="illustration">
    </div>

    <!-- Right Side -->
    <div class="right">
        
        <div class="input-box">
            <input type="text" placeholder="Enter Email/Mobile number">
        </div>

        <div class="terms">
            By continuing, you agree to Flipkart's 
            <a href="#">Terms of Use</a> and 
            <a href="#">Privacy Policy</a>
        </div>

        <div class="btn">
            <button>Request OTP</button>
        </div>

        <div class="bottom-text">
            New to Flipkart? <a href="#">Create an account</a>
        </div>

    </div>

</div>

</body>
</html>
