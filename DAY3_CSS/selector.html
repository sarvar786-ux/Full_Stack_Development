<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>selector in CSS</title>
    <link rel="stylesheet" href="selector.css">
</head>
<body>
    <div id="developer"><u>sarvar is a developer</u></div>
    <div id="developer">sarvar is a student </div>
    <div class="data"><i>sarvar is a data scientist</i></div>
    <div class="data"><b>sarvar is a data analyst</b></div>
</body>
</html>
<!-- selector in CSS are used select the element to select -->
 <!-- id selector is used to select the element with specific id and it is denoted by # and it is unique for each element in a page -->
 <!-- class selector is used to select the element with specific class and it is denoted by . -->
