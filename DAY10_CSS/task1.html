<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task1</title>
</head>
<style>
    body{
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
        height: 100vh;
        background-color: grey;
        display: grid;
        grid-template-rows: "nav nav nav"
                            "section section section"
                            "main main main"
                            "main main main"
                            "main main main"
                            "footer footer footer";
        
    }
    nav {
        background-color: lightblue;
        padding: 10px;
        border-radius: 10px;
        display: flex;
        justify-content: flex-end;

    }
    nav a {
        margin: 0 10px;
        text-decoration: none;
        color: grey;
    }
    nav a:hover {
        color: rgb(0, 0, 0);
        text-decoration: underline;
    }
    section {
        display: flex;
        justify-content: space-around;
        margin: 20px 0;
    }
    .section1, .section2 {
        width: 45%;
        height: 100px;
        background-color: lightgray;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    main {
        background-color: lightgreen;
        padding: 20px;
    }
    .main-content {
        width: 100%;
        height: 150px;
        background-color: white;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    footer {
        background-color: lightcoral;
        padding: 10px;
        text-align: center;
    }
    @media screen and (max-width: 768px) {
        nav {
            background-color: lightblue;
            padding: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: flex-end;
        }
        
    }
</style>
<body>
    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>
    <section>
        <div class="section1">section1</div>
        <div class="section2">section2</div>
    </section>
    <main>
        <div class="main-content">Main Content</div>
    </main>
    <footer>
        <p>Footer Content</p>
    </footer>
</body>
</html>
