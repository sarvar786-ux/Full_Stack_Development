<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>looping_statements</title>
</head>
<body>
    <script>
        console.log("====while loop====");
        
        let a=1;  // declaring and assiging
        while(a<=5){ //condition
            console.log(a);
            a++; // update /re-assigning
        }
        
        console.log("=====do while loop ======");

        let i = 1;

        do {
            console.log("Number: " + i);
            i++;
            } while (i <= 5);

        console.log("=====for loop =======");
        for (let x=1;x<=5;x++){
            console.log(
                x
            );
            
        }
        
    </script>
</body>
</html>
