<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>promises</title>
</head>
<body>
    <script>
        // promises are used to handle asynchronous operations in JavaScript. 
        // a promise is an object store the data in key value pair.
        // let p1=new Promise((resolve, reject) => {
        //     setTimeout(() => {
        //         console.log('this is a promise');
                
        //     }, 4000);
        // });

        // console.log(p1);
        

        function step1() {
            return new Promise((resolve) => {
                setTimeout(() => {
                    console.log("water is ready");
                    resolve();
                }, 5000);
            });
        }
        function step2() {
            return new Promise((resolve) => {
                setTimeout(() => {
                    console.log("Sugar is ready");
                    resolve();
                }, 3000);
            });
        }
        function step3() {
            return new Promise((resolve) => {
                setTimeout(() => {
                    console.log("Ice is ready");
                    resolve();
                }, 3000);
            });
        }
        function step4() {
            return new Promise((resolve) => {
                setTimeout(() => {
                    console.log("Lemon water is ready");
                    resolve();
                }, 6000);
            });
        }

        

// handling promises using then and catch method
        // step1()
        // .then(()=>step2())
        // .then(()=>step3())
        // .then(()=>step4())
        // .catch(
        //     (error)=> console.log(error)
        // )
// handling promises using async and await
        async function makeLemonwater() {
            try {
                await step1();
                await step2();
                await step3();
                await step4();
            } catch (error) {
                console.log(error);
            }
        }
        makeLemonwater();






    </script>
</body>
</html>
