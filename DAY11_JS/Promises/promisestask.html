<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>promises task </title>
</head>
<body>
    <script> 
        let api=fetch("https://jsonplaceholder.typicode.com/users");
        console.log(api);//promise

        // handing the promises then and catch
        api
        .then((result)=>{
            // console.log(result);
            return result.json();
        })
        .then((data)=>{
            console.log(data);
        })
        .catch((error)=>{
        console.log('error in the code');
        });

        // using async await
        async function fetchUsers() {
            try {
                let response = await fetch("https://jsonplaceholder.typicode.com/users");
                let data = await response.json();
                console.log(data);
            } catch (error) {
                console.log('error in the code');
            }
        }

        fetchUsers();
    </script>
</body>
</html>
