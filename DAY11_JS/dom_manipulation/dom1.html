<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom1</title>
</head>
<body>
    <h1>Print Numbers</h1>
    <p id="num"></p>
    <script>
        let num= document.getElementById("num");
         let a=1;
         for(let i=1;i<=5;i++){
            num.innerHTML+=a+"<br>";
            a++;
         }
         num.innerHTML=a;
    </script>
</body>
</html>
