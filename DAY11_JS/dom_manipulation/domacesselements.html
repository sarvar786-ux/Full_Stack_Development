<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Elements</title>
</head>
<body>
    <p id="p" ></p>
    <h1></h1>
    <h1></h1>
    <h1></h1>


    <div class="div"></div>
    <div class="div"></div>
    <script>
        let p=document.getElementById("p");
        console.log(p);

        let h1=document.getElementsByTagName("h1");
        console.log(h1); // html collection of h1 tags
        
        let div=document.getElementsByClassName("div");
        console.log(div); // html collection of div tags with class name div   

        let div1=document.querySelector(".div"); // gives first element with class name div
        console.log(div1);
        
        let div2=document.querySelectorAll(".div"); // gives all element with class name div as node list
        console.log(div2);
    </script>
</body>
</html>
