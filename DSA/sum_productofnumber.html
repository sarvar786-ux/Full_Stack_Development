<!-- print sum of 1 to 10 and product  -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sum_product</title>
 </head>
 <body>
    <script>
                    function sumAndProduct(n) {
                    let sum = 0;
                    let product = 1;
                    for (let i = 1; i <= n; i++) {
                    sum += i;
                    product *= i;
                   }

                   console.log("Sum:", sum);
                   console.log("Product:", product);
                  }

                  // Call the function for first 10 natural numbers
                  sumAndProduct(10);

    </script>
 </body>
 </html>
