<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            color: rgb(174, 188, 47);
        }
        div::first-letter{
            font-size: 30px;
            color: rgb(72, 173, 36);
        }
        p{
            background-color: rgb(36, 74, 93);
            height: 100px;
            width: 100px;
        }
        p:hover{
            background-color: rgb(102, 110, 114);
            height: 200px;
            width: 200px;
        }
    </style>
</head>
<body>
    <div>Lorem ipsum dolor sit amet consectetur adipisicing elit. Consequuntur in quis quod labore earum eius, a consequatur asperiores eveniet esse impedit, aliquid totam reiciendis ex, nulla illo expedita quas ipsa.</div>
    <p></p>
</body>
</html>
<!-- 
pseudo class: based on the state of the element
-->
