<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
    <style>
        table,td,th{
            border : 1px solid black;
            border-collapse: collapse;
            width: 400px;
            height: 20px;
        }
    </style>
</head>
<body>
    <table border="1" CELLSPACING="10" CELLPADDING="10">
        <thead>
            <tr>
                <th>
                    Slno
                </th>
                <TH>Name</TH>
                <TH>phone</TH>
            </tr>
        </thead>
        <tbody>
            <TR>
                <TD>1</TD>
                <TD>Ravi</TD>
                <TD>1234567890</TD>
            </TR>
            <tr>
                <TD>2</TD>
                <TD>Raju</TD>
                <TD>1234567890</TD>
            </tr>
            <tr>
                <TD>3</TD>
                <TD>Ramesh</TD>
                <TD>1234567890</TD>
            </tr>
        </tbody>
    </table>
</body>
</html>

<!-- 
table -- used  to  display data in a tabular format 
thead -- represents the header row of the table 
tbody -- represents the body of the table 
tr    -- represents a row in the table
th    -- represents a header cell in the table
td    -- represents a data cell in the table
cellspacing -- specifies the space between cells in the table
cellpadding -- specifies the space between the cell content and the cell border
-->
