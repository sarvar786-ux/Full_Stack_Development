<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid4</title>
</head>
<style>
    .parent{
        border: 1px solid black;
        height: 100vh;
        display: grid;
        grid-template-areas:"nav nav nav"
                            "main main sidebar"
                            "footer footer footer" ;
        gap: 10px;
    }
    .parent div{
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 20px;
    }
    ._1
    {
     background-color: yellow;
        grid-area: nav;

    }
    ._2
    {
       background-color: lightgreen;
        grid-area: main;
    }
    ._3
    {
       background-color: lightblue;
        grid-area: sidebar;
    }
    ._4{
        background-color: lightpink;
        grid-area: footer;
    }                                                    
    ._4{
        background-color: lightpink;
        grid-area: footer;
    }
</style>
<body>
    <div class="parent">
        <div class="_1">nav bar</div>
        <div class="_2">main content</div>
        <div class="_3">sidebar</div>
        <div class="_4">footer</div>
    </div>
</body>
</html>
