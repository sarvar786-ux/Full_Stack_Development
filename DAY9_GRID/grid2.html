<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid</title>
</head>
<style>
    .grid-container{
        display: grid;
        grid-template-columns: repeat(5,100px);
        grid-template-rows: repeat(5,100px);
    }
    .grid-item{
        border: 1px solid black;
        font-size: 40px;
    }
    ._1
    {
        background-color: yellow;
        grid-column-start: 1;
        grid-column-end: 3;
    }
    ._2
    {
        background-color: lightblue;
        /* grid-column-start: 3;
        grid-column-end: 6; */
        grid-column: 3/6;
    }
    ._3
    {
        background-color: lightgreen;
        grid-row: 2/6;
    }
    ._4{
        background-color: lightpink;
        grid-row: 2/5;
        grid-column: 2/5;
    }
    ._5{
        background-color: lightgray;
         grid-row: 2/5;
        /* grid-column: 2/6; */ 
        /* grid-area : 5/2/6/6; */
    }
    ._6{
        background-color: lightcoral;
        /* grid-row: 5/6; */
        grid-column: 2/6;
    }
</style>
<body>
    <div class="grid-container">
        <div class="grid-item _1" >1</div>
        <div class="grid-item _2">2</div>
        <div class="grid-item _3">3</div>
        <div class="grid-item _4">4</div>
        <div class="grid-item _5">5</div>
        <div class="grid-item _6">6</div> 
    </div>
</body>
</html>
