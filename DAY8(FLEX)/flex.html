<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex 1</title>
    <style>
        .parent{
            height: 600px;
            border: 1px solid black;
            display: flex;
            /* flex-direction: row-reverse; */
             /* flex-direction: row;  default */
             /* flex-direction: column; */
             justify-content: center;
             align-items: center;
             gap: 10px;
        }
        .item{
            width: 100px;
            height: 100px;
            border: 1px solid black;
            font-size: 40px;
        }
        ._1{
            background-color: tomato;
        }
        ._2{
            background-color: lightcoral;
        }
        ._3{
            background-color: lightgreen;
        }
        ._4{
            background-color: lightyellow;
        }


    </style>
</head>
<body>
    <div class="parent">
        <div class="item _1">1</div>
        <div class="item _2">2</div>
        <div class="item _3">3</div>
        <div class="item _4">4</div>
    </div>
</body>
</html>
<!-- Flex is a 1D layout model (ROW/COLUMN)
 flex container ---(parent) and
 flex item      ---(child)
 -->
