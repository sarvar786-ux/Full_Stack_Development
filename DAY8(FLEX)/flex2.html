<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex 2</title>
    <style>
        .parent{
            height: 900px;
            border: 1px solid black;
            display: flex;
             /* flex-direction: row;  default */
             /* flex-direction: column; */
            justify-content: space-between;
            /* align-items: center; */
            /* gap: 9px; */
            flex-wrap: wrap;
        }
        .item{
            width: 100px;
            height: 100px;
            border: 1px solid black;
            font-size: 40px;
        }
        ._1{
            background-color: #cce99d;
        }
        ._2{
            background-color: lightcoral;
        }
        ._3{
            background-color: lightgreen;
        }
        ._4{
            background-color: lightyellow;
        }
        ._5{
            background-color: lightblue;
        }
        ._6{
            background-color: lightpink;
        }
        ._7{
            background-color: lightgray;
        }
        ._8{
            background-color: lightcyan;
        }
        #special{
            background-color: black;
            color: white;
            /* flex-grow:5; */
            flex-shrink: 10;
        }

    </style>
</head>
<body>
    <div class="parent">
        <div class="item _1">1</div>
        <div class="item _2">2</div>
        <div class="item _3"  id="special">3</div>
        <div class="item _4">4</div>
        <div class="item _5">5</div>
        <div class="item _6">6</div>
        <div class="item _7">7</div>
        <div class="item _8">8</div>
        <div class="item _5">5</div>
        <div class="item _6">6</div>
        <div class="item _7">7</div>
        <div class="item _8">8</div>
    </div>
</body>
</html>
<!-- Flex is a 1D layout model (ROW/COLUMN)
 flex container ---(parent) and
 flex item      ---(child)
 -->
